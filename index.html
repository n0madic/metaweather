<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src https://api.open-meteo.com https://wttr.in https://api.met.no https://api.tomorrow.io https://api.openweathermap.org https://cdn.jsdelivr.net; img-src 'self' data:;">
<title>MetaWeather — Multi-Model Weather Aggregator</title>
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MetaWeather">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #070D1A;
    --bg-secondary: #0F172A;
    --bg-card: rgba(255,255,255,0.035);
    --border: rgba(255,255,255,0.06);
    --text-primary: #F8FAFC;
    --text-secondary: #E2E8F0;
    --text-muted: #94A3B8;
    --text-dim: #64748B;
    --text-faint: #475569;
    --accent-blue: #38BDF8;
    --accent-green: #34D399;
    --accent-yellow: #FBBF24;
    --accent-rain: #60A5FA;
    --accent-red: #EF4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
    background: linear-gradient(168deg, var(--bg-primary) 0%, var(--bg-secondary) 35%, #172554 70%, #1E1B4B 100%);
    color: var(--text-secondary);
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* Loading */
  #loader {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .spinner {
    position: relative;
    width: 72px;
    height: 72px;
    margin-bottom: 28px;
  }
  .spinner-ring {
    position: absolute;
    border: 2px solid transparent;
    border-radius: 50%;
  }
  .spinner-ring:nth-child(1) { inset: 0;  border-top-color: var(--accent-blue);   animation: orbit 1.0s linear infinite; }
  .spinner-ring:nth-child(2) { inset: 6px;  border-top-color: var(--accent-green);  animation: orbit 1.4s linear infinite; }
  .spinner-ring:nth-child(3) { inset: 12px; border-top-color: var(--accent-yellow); animation: orbit 1.8s linear infinite; }
  @keyframes orbit { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
  .loader-title { font-size: 17px; font-weight: 600; color: var(--text-secondary); animation: pulse 2s ease infinite; }

  /* Main layout */
  #app { display: none; }
  .container { max-width: 960px; margin: 0 auto; padding: 0 16px; }

  /* Header */
  header {
    padding: 18px 20px 14px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .header-title { font-size: 21px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.4px; display: flex; align-items: center; gap: 8px; }
  .lang-select {
    font-size: 11px; padding: 2px 4px; border-radius: 4px;
    background: rgba(255,255,255,0.04); color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.06); cursor: pointer;
    outline: none;
  }
  .lang-select:hover { background: rgba(255,255,255,0.08); }
  .lang-select option { background: var(--bg-secondary); color: var(--text-secondary); }
  .refresh-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.03); color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    transition: all 0.2s; flex-shrink: 0;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
  .refresh-btn.spinning { animation: orbit 0.8s linear infinite; pointer-events: none; opacity: 0.5; }
  .header-coords { font-size: 11px; color: #334155; margin-top: 1px; }
  .header-coords .fail { color: var(--accent-red); }
  .badges-bar { display: flex; gap: 6px; align-items: center; margin-left: auto; }
  .model-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .model-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .model-badge.ok { background: color-mix(in srgb, var(--c) 8%, transparent); color: var(--c); border: 1px solid color-mix(in srgb, var(--c) 20%, transparent); }
  .model-badge.ok:hover { background: color-mix(in srgb, var(--c) 18%, transparent); }
  .model-badge.ok.disabled { opacity: 0.35; text-decoration: line-through; }
  .model-badge.fail { background: rgba(239,68,68,0.12); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.25); cursor: default; position: relative; }
  .model-badge.fail::after { content: "\00D7"; margin-left: 4px; font-weight: 700; font-size: 12px; }
  .source-count-warn { color: var(--accent-red); }

  /* Hero + Tiles combined */
  .hero {
    margin-top: 14px;
    background: linear-gradient(135deg, rgba(56,189,248,0.07) 0%, rgba(30,27,75,0.25) 100%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
  }
  .unit-toggle {
    display: flex; flex-direction: column; align-items: center; gap: 0;
    font-size: 14px; font-weight: 600; user-select: none;
  }
  .unit-toggle span {
    cursor: pointer; padding: 0 4px; border-radius: 3px; transition: all 0.15s;
    line-height: 1.2;
  }
  .unit-toggle span.active { color: var(--text-primary); }
  .unit-toggle span:not(.active) { color: var(--text-dim); opacity: 0.5; }
  .unit-toggle span:not(.active):hover { opacity: 0.8; }
  .unit-toggle .sep { font-size: 9px; color: var(--text-dim); opacity: 0.3; cursor: default; padding: 0; }
  .hero-icon { text-align: center; min-width: 70px; }
  .hero-icon .emoji { font-size: 40px; line-height: 1; }
  .hero-icon .desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .hero-temp { min-width: 0; }
  .hero-temp .big {
    font-size: 42px; font-weight: 800; color: var(--text-primary);
    line-height: 1; letter-spacing: -2px; font-variant-numeric: tabular-nums;
    display: flex; align-items: center; gap: 4px;
  }
  .hero-temp .feels { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .hero-meta { margin-top: 6px; font-size: 10px; color: var(--text-faint); display: flex; flex-wrap: wrap; gap: 3px 8px; }
  .hero-meta-sources { display: flex; flex-wrap: wrap; gap: 3px 8px; font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .hero-meta .spread-ok { color: var(--accent-green); font-weight: 700; }
  .hero-meta .spread-mid { color: var(--accent-yellow); font-weight: 700; }
  .hero-meta .spread-bad { color: var(--accent-red); font-weight: 700; }

  /* Metric tiles (inline in hero) */
  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .tile {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 6px 12px;
  }
  .tile-label {
    font-size: 9px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .tile-value {
    font-size: 16px; font-weight: 700; color: #F1F5F9;
    font-variant-numeric: tabular-nums;
  }
  .tile-value .unit { font-size: 10px; font-weight: 400; color: var(--text-muted); margin-left: 2px; }

  @media (max-width: 700px) {
    .hero { grid-template-columns: auto 1fr; }
    .tiles { grid-column: 1 / -1; grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 480px) {
    .tiles { grid-template-columns: repeat(2, 1fr); }
  }

  /* Chart section */
  .chart-section {
    margin-top: 12px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px 10px;
  }
  .chart-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px; flex-wrap: wrap; gap: 8px;
  }
  .chart-header h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .days-toggle {
    display: flex; font-size: 11px; border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .days-toggle span {
    padding: 3px 9px; cursor: pointer; transition: all 0.15s;
    background: rgba(255,255,255,0.03); color: var(--text-dim);
  }
  .days-toggle span.active { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
  .days-toggle span:not(.active):hover { background: rgba(255,255,255,0.06); }
  .chart-toggle {
    font-size: 11px; padding: 3px 11px; border-radius: 8px;
    background: rgba(255,255,255,0.03); color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
    transition: all 0.2s;
  }
  .chart-toggle.active { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
  .chart-canvas { width: 100%; height: 260px; }
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 6px 4px 2px; font-size: 11px; color: var(--text-dim);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; cursor: default; padding: 2px 4px; border-radius: 4px; transition: background 0.15s; }
  .legend-item.hoverable { cursor: pointer; }
  .legend-item.hoverable:hover { background: rgba(255,255,255,0.08); }
  .legend-line { width: 18px; height: 3px; border-radius: 2px; }
  .legend-dash { width: 18px; height: 0; border-top: 2px dashed; opacity: 0.55; }
  .legend-box { width: 9px; height: 9px; border-radius: 2px; }

  /* Daily cards */
  .daily-section { margin-top: 12px; }
  .daily-section h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
  .daily-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(136px, 1fr)); gap: 8px; }
  .day-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
    transition: transform 0.15s;
  }
  .day-card:hover { transform: translateY(-2px); }
  .day-card.today {
    background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(30,27,75,0.18));
    border-color: rgba(56,189,248,0.18);
  }
  .day-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
  .day-card.today .day-name { color: var(--accent-blue); }
  .day-date { font-size: 10px; color: var(--text-faint); margin-bottom: 6px; }
  .day-emoji { font-size: 34px; line-height: 1; }
  .day-desc { font-size: 10px; color: var(--text-muted); margin: 5px 0 8px; min-height: 24px; line-height: 1.3; }
  .day-temps { font-size: 20px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }
  .day-temps .lo { font-size: 13px; font-weight: 400; color: var(--text-dim); }
  .day-extra { margin-top: 8px; display: flex; justify-content: center; gap: 10px; font-size: 10px; color: var(--text-faint); }
  .day-extra .sm { font-size: 9px; }

  /* Footer */
  .app-footer {
    margin-top: 28px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    font-size: 11px;
    color: #334155;
    line-height: 1.8;
  }
  .footer-title { font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
  .footer-model { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .footer-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; position: relative; top: -1px; }
  .footer-divider { margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 6px; color: var(--text-faint); }
  .footer-powered { margin-top: 4px; color: var(--text-dim); display: flex; flex-wrap: wrap; align-items: baseline; gap: 0 4px; }
  .footer-powered a { color: var(--accent-blue); text-decoration: none; }

  /* Settings */
  .settings-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.03); color: var(--text-muted);
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 16px;
    transition: all 0.2s; flex-shrink: 0;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
  .settings-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.65);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .settings-overlay.open { opacity: 1; pointer-events: auto; }
  .settings-modal {
    background: var(--bg-secondary); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 24px; width: 100%; max-width: 440px;
    max-height: 90vh; overflow-y: auto; color: var(--text-secondary);
  }
  .settings-modal h2 {
    font-size: 16px; font-weight: 700; color: var(--text-primary);
    margin: 0 0 18px; display: flex; align-items: center;
    justify-content: space-between;
  }
  .settings-modal .close-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 22px; cursor: pointer; padding: 0 4px;
    transition: color 0.15s;
  }
  .settings-modal .close-btn:hover { color: var(--text-primary); }
  .settings-section {
    margin-bottom: 16px; padding: 14px;
    background: rgba(255,255,255,0.025); border: 1px solid var(--border);
    border-radius: 10px;
  }
  .settings-section h3 {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    margin: 0 0 8px; display: flex; align-items: center; gap: 6px;
  }
  .settings-limit {
    margin-left: auto; font-weight: 400; font-size: 10px;
    color: var(--text-faint); opacity: 0.7;
  }
  .settings-section .source-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .settings-input-wrap {
    display: flex; gap: 6px; align-items: center;
  }
  .settings-input {
    flex: 1; min-width: 0; padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: var(--text-primary);
    font-size: 13px; font-family: monospace; outline: none;
    transition: border-color 0.15s; box-sizing: border-box;
  }
  .settings-input:focus { border-color: var(--accent-blue); }
  .settings-input::placeholder { color: var(--text-dim); }
  .btn-clear-inline {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03);
    color: var(--text-dim); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-clear-inline:hover { background: rgba(239,68,68,0.15); color: var(--accent-red); border-color: rgba(239,68,68,0.25); }
  .btn-save-all {
    width: 100%; padding: 10px; border-radius: 10px; margin-top: 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; border: 1px solid rgba(56,189,248,0.25);
    background: rgba(56,189,248,0.15); color: var(--accent-blue);
  }
  .btn-save-all:hover { background: rgba(56,189,248,0.25); }
  .key-status {
    font-size: 11px; margin-top: 6px; min-height: 16px;
    color: var(--text-dim);
  }
  .key-status.saved { color: var(--accent-green); }
  .key-status.error { color: var(--accent-red); }
  .settings-note {
    font-size: 10px; color: var(--text-faint);
    line-height: 1.5; margin-top: 14px;
  }

  /* Error */
  #error-screen {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    color: var(--accent-red);
    font-size: 18px;
  }

  @media (max-width: 600px) {
    .hero { padding: 12px; }
    .hero-temp .big { font-size: 36px; }
    .hero-icon .emoji { font-size: 32px; }
    .chart-canvas { height: 200px; }
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="spinner">
    <div class="spinner-ring"></div>
    <div class="spinner-ring"></div>
    <div class="spinner-ring"></div>
  </div>
  <div class="loader-title" id="loader-title">Gathering forecasts</div>
</div>

<!-- Error Screen -->
<div id="error-screen"></div>

<noscript>
  <div style="display:flex;min-height:100vh;align-items:center;justify-content:center;color:#94A3B8;font-size:18px;text-align:center;padding:20px;">
    JavaScript is required to display weather data.
  </div>
</noscript>

<!-- Main App -->
<main id="app" role="main" aria-label="Weather forecast">
  <header>
    <div>
      <h1 class="header-title" id="header-title"><span id="header-loc"></span><button class="refresh-btn" id="refresh-btn" onclick="refresh()" aria-label="Refresh forecasts" title="Refresh forecasts">&#x21bb;</button><select class="lang-select" id="lang-select" onchange="setLang(this.value)"><option value="en">EN</option><option value="ru">RU</option><option value="uk">UK</option></select></h1>
      <div class="header-coords" id="header-coords"></div>
    </div>
    <div class="badges-bar">
      <div class="model-badges" id="model-badges"></div>
      <button class="settings-btn" id="settings-btn" onclick="openSettings()" aria-label="API Settings" title="API Settings">&#x2699;</button>
    </div>
  </header>

  <div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-modal" role="dialog" aria-label="API Settings">
      <h2>
        <span>&#x2699; <span data-i18n="api_settings">API Settings</span></span>
        <button class="close-btn" onclick="closeSettings()" aria-label="Close">&times;</button>
      </h2>
      <div class="settings-section">
        <h3><span class="source-dot" style="background:#06B6D4"></span> Tomorrow.io <span class="settings-limit">500 req/day</span></h3>
        <div class="settings-input-wrap">
          <input class="settings-input" type="password" id="key-tomorrow" placeholder="Enter API key" autocomplete="off" spellcheck="false">
          <button class="btn-clear-inline" onclick="clearKey('tomorrow')" title="Clear" aria-label="Clear">&times;</button>
        </div>
        <div class="key-status" id="status-tomorrow"></div>
      </div>
      <div class="settings-section">
        <h3><span class="source-dot" style="background:#FF8C00"></span> OpenWeatherMap <span class="settings-limit">1M req/month</span></h3>
        <div class="settings-input-wrap">
          <input class="settings-input" type="password" id="key-owm" placeholder="Enter API key" autocomplete="off" spellcheck="false">
          <button class="btn-clear-inline" onclick="clearKey('owm')" title="Clear" aria-label="Clear">&times;</button>
        </div>
        <div class="key-status" id="status-owm"></div>
      </div>
      <button class="btn-save-all" onclick="saveAllKeys()" data-i18n="save">Save</button>
      <div class="settings-note" data-i18n="keys_local_note">
        API keys are stored locally in your browser and never sent to any server except the weather provider.
      </div>
    </div>
  </div>

  <div class="container">
    <section class="hero" id="hero" aria-label="Current weather">
      <div class="hero-icon">
        <div class="emoji" id="hero-emoji"></div>
        <div class="desc" id="hero-desc"></div>
      </div>
      <div class="hero-temp">
        <div class="big"><span id="hero-temp-val"></span><div class="unit-toggle" id="unit-toggle" role="radiogroup" aria-label="Temperature unit"><span class="active" data-unit="C" role="radio" aria-checked="true" tabindex="0" onclick="setUnit('C')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setUnit('C')}">C</span><span class="sep">&mdash;</span><span data-unit="F" role="radio" aria-checked="false" tabindex="0" onclick="setUnit('F')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setUnit('F')}">F</span></div></div>
        <div class="feels" id="hero-feels"></div>
        <div class="hero-meta" id="hero-meta"></div>
      </div>
      <div class="tiles" id="tiles"></div>
    </section>

    <section class="chart-section" aria-label="Temperature chart">
      <div class="chart-header">
        <h2>Temperature & Precipitation</h2>
        <div style="display:flex;gap:4px">
          <div class="days-toggle" id="days-toggle" role="radiogroup" aria-label="Chart days">
            <span data-days="3" role="radio" aria-checked="false" tabindex="0" onclick="setChartDays(3)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setChartDays(3)}">3d</span>
            <span class="active" data-days="5" role="radio" aria-checked="true" tabindex="0" onclick="setChartDays(5)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setChartDays(5)}">5d</span>
          </div>
          <button class="chart-toggle active" id="chart-toggle" onclick="toggleModels()">Hide models</button>

function weightedMean(values, weights) {
  let sw = 0, svw = 0;
  for (let i = 0; i < values.length; i++) {
    if (values[i] != null && !isNaN(values[i])) {
      svw += values[i] * weights[i];
      sw += weights[i];
    }
  }
  return sw > 0 ? svw / sw : null;
}

// Agreement-aware weighted mean: outliers near weighted median get dampened
function smartMean(values, weights) {
  const v = [], w = [];
  for (let i = 0; i < values.length; i++) {
    if (values[i] != null && !isNaN(values[i])) { v.push(values[i]); w.push(weights[i]); }
  }
  if (!v.length) return { value: null, confidence: 0 };
  if (v.length === 1) return { value: v[0], confidence: 0.5 };

  // Weighted median
  const pairs = v.map((val, i) => ({ val, w: w[i] })).sort((a, b) => a.val - b.val);
  let cum = 0;
  const totalW = w.reduce((s, x) => s + x, 0);
  let med = pairs[pairs.length - 1].val;
  for (const p of pairs) { cum += p.w; if (cum >= totalW / 2) { med = p.val; break; } }

  // MAD (median absolute deviation)
  const devs = v.map(x => Math.abs(x - med)).sort((a, b) => a - b);
  const mad = Math.max(devs[Math.floor(devs.length / 2)], 0.1);

  // Gaussian agreement weights (sigma=2 MADs)
  const agreeW = v.map(x => Math.exp(-0.5 * ((Math.abs(x - med) / mad) / 2) ** 2));
  const finalW = w.map((wi, i) => wi * agreeW[i]);
  const sw = finalW.reduce((s, x) => s + x, 0);
  const result = finalW.reduce((s, x, i) => s + v[i] * x, 0) / sw;
  const confidence = agreeW.reduce((s, x) => s + x, 0) / agreeW.length;
  return { value: result, confidence };
}

function arrMedian(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}

function circularMean(angles) {
  if (!angles.length) return 0;
  let sinSum = 0, cosSum = 0;
  for (const a of angles) {
    sinSum += Math.sin((a * Math.PI) / 180);
    cosSum += Math.cos((a * Math.PI) / 180);
  }
  return ((Math.atan2(sinSum, cosSum) * 180) / Math.PI + 360) % 360;
}

function windDir(deg) {
  const d = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];

}

function majorityVote(codes, weights) {
  const m = {};
  for (let i = 0; i < codes.length; i++) {
    if (codes[i] != null) m[codes[i]] = (m[codes[i]] || 0) + weights[i];
  }
  let best = 0, bw = -1;
  for (const [c, w] of Object.entries(m)) { if (w > bw) { best = +c; bw = w; } }
  return best;
}

// For daily cards: prioritize precipitation codes so rainy days don't show as just "Cloudy"
function dailyWeatherCode(codes) {
  const precipCodes = codes.filter((c) => c >= 51);
  if (precipCodes.length > 0) return majorityVote(precipCodes, precipCodes.map(() => 1));

}

function fetchWithTimeout(url, ms = 10000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(id));
}

async function fetchModel(key, lat, lon) {
  const cfg = MODELS[key];
  const params = new URLSearchParams({
    latitude: lat.toFixed(4),
    longitude: lon.toFixed(4),
    hourly: HOURLY_PARAMS,
    current: CURRENT_PARAMS,
    wind_speed_unit: "ms",
    forecast_days: "5",
    timezone: "auto",
  });
  try {
    const res = await fetchWithTimeout(`${cfg.endpoint}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return { key, data: await res.json(), ok: true };
  } catch (err) {
    return { key, data: null, ok: false, error: err.message };
  }
}

}

function normalizeWttrIn(wttrData, refTimes) {
  // Build a time-indexed map of wttr.in hourly data
  const hourlyMap = {};

    const dateStr = day.date; // "2026-03-27"

      const hh = String(Math.floor(parseInt(h.time) / 100)).padStart(2, "0");
      const timeKey = `${dateStr}T${hh}:00`;
      hourlyMap[timeKey] = {
        temperature_2m: safeNum(h.tempC),
        relative_humidity_2m: safeNum(h.humidity),
        apparent_temperature: safeNum(h.FeelsLikeC),
        pressure_msl: safeNum(h.pressure),
        wind_speed_10m: safeNum(h.windspeedKmph) != null ? safeNum(h.windspeedKmph) / 3.6 : null, // km/h -> m/s
        wind_direction_10m: safeNum(h.winddirDegree),
        precipitation: safeNum(h.precipMM),
        cloud_cover: safeNum(h.cloudcover),
        weather_code: WWO_TO_WMO[parseInt(h.weatherCode)] ?? null,
      };
    }
  }

  // Build arrays aligned to refTimes
  const result = {
    time: refTimes,
    temperature_2m: [],
    relative_humidity_2m: [],
    apparent_temperature: [],
    pressure_msl: [],
    wind_speed_10m: [],
    wind_direction_10m: [],
    precipitation: [],
    cloud_cover: [],
    weather_code: [],
  };

  for (const t of refTimes) {
    const entry = hourlyMap[t];
    for (const param of Object.keys(result)) {
      if (param === "time") continue;
      result[param].push(entry ? entry[param] : null);
    }
  }

  // Current conditions
  const cc = wttrData.current_condition?.[0];
  const current = cc ? {
    temperature_2m: safeNum(cc.temp_C),
    relative_humidity_2m: safeNum(cc.humidity),
    apparent_temperature: safeNum(cc.FeelsLikeC),
    pressure_msl: safeNum(cc.pressure),
    wind_speed_10m: safeNum(cc.windspeedKmph) != null ? safeNum(cc.windspeedKmph) / 3.6 : null,
    wind_direction_10m: safeNum(cc.winddirDegree),
    cloud_cover: safeNum(cc.cloudcover),
    weather_code: WWO_TO_WMO[parseInt(cc.weatherCode)] ?? null,
  } : null;

  return { hourly: result, current };
}

// ── MET Norway Fetching & Normalization ──────────────────────────────
async function fetchMetNorway(lat, lon) {
  try {
    const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}`;
    const res = await fetchWithTimeout(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return { ok: true, data: await res.json() };
  } catch (err) {
    return { ok: false, error: err.message };
  }
}

function normalizeMetNorway(metData, refTimes, utcOffsetSec) {
  const ts = metData.properties?.timeseries;
  if (!ts?.length) return null;

  // Build time-indexed map (UTC -> local time)
  const hourlyMap = {};
  for (const entry of ts) {
    const utcMs = new Date(entry.time).getTime();
    const loc = new Date(utcMs + utcOffsetSec * 1000);
    const key = `${loc.getUTCFullYear()}-${String(loc.getUTCMonth()+1).padStart(2,"0")}-${String(loc.getUTCDate()).padStart(2,"0")}T${String(loc.getUTCHours()).padStart(2,"0")}:${String(loc.getUTCMinutes()).padStart(2,"0")}`;
    const d = entry.data?.instant?.details;
    if (!d) continue;
    const sym = entry.data?.next_1_hours?.summary?.symbol_code
      ?? entry.data?.next_6_hours?.summary?.symbol_code;
    hourlyMap[key] = {
      temperature_2m: d.air_temperature ?? null,
      relative_humidity_2m: d.relative_humidity ?? null,
      pressure_msl: d.air_pressure_at_sea_level ?? null,
      wind_speed_10m: d.wind_speed ?? null,
      wind_direction_10m: d.wind_from_direction ?? null,
      precipitation: entry.data?.next_1_hours?.details?.precipitation_amount ?? null,
      cloud_cover: d.cloud_area_fraction ?? null,
      weather_code: sym ? yrSymbolToWmo(sym) : null,
    };
  }

  const result = { time: refTimes, temperature_2m: [], relative_humidity_2m: [], pressure_msl: [], wind_speed_10m: [], wind_direction_10m: [], precipitation: [], cloud_cover: [], weather_code: [] };
  for (const t of refTimes) {
    const e = hourlyMap[t];
    for (const p of Object.keys(result)) { if (p !== "time") result[p].push(e ? e[p] : null); }
  }

  const f = ts[0]?.data?.instant?.details;
  const fSym = ts[0]?.data?.next_1_hours?.summary?.symbol_code;
  const current = f ? {
    temperature_2m: f.air_temperature ?? null, relative_humidity_2m: f.relative_humidity ?? null,
    pressure_msl: f.air_pressure_at_sea_level ?? null, wind_speed_10m: f.wind_speed ?? null,
    wind_direction_10m: f.wind_from_direction ?? null, cloud_cover: f.cloud_area_fraction ?? null,
    weather_code: fSym ? yrSymbolToWmo(fSym) : null,
  } : null;
  return { hourly: result, current };
}

// ── Tomorrow.io Fetch & Normalize ────────────────────────────────────
async function fetchTomorrowIo(lat, lon) {
  const key = getApiKey("tomorrow");
  if (!key) return { ok: false, error: "no_key", noKey: true };
  try {
    const url = `https://api.tomorrow.io/v4/weather/forecast?location=${lat.toFixed(4)},${lon.toFixed(4)}&apikey=${encodeURIComponent(key)}&timesteps=1h&units=metric`;
    const res = await fetchWithTimeout(url);
    if (res.status === 401 || res.status === 403) throw new Error("Invalid API key");
    if (res.status === 429) throw new Error("Rate limit exceeded");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return { ok: true, data: await res.json() };
  } catch (err) {
    return { ok: false, error: err.message };
  }
}

function normalizeTomorrowIo(tomorrowData, refTimes, utcOffsetSec) {
  const hourly = tomorrowData?.timelines?.hourly;
  if (!hourly?.length) return null;

  const hourlyMap = {};
  for (const entry of hourly) {
    const utcMs = new Date(entry.time).getTime();
    const loc = new Date(utcMs + utcOffsetSec * 1000);
    const key = `${loc.getUTCFullYear()}-${String(loc.getUTCMonth()+1).padStart(2,"0")}-${String(loc.getUTCDate()).padStart(2,"0")}T${String(loc.getUTCHours()).padStart(2,"0")}:${String(loc.getUTCMinutes()).padStart(2,"0")}`;
    const v = entry.values || {};
    hourlyMap[key] = {
      temperature_2m: v.temperature ?? null,
      relative_humidity_2m: v.humidity ?? null,
      pressure_msl: v.pressureSeaLevel ?? null,
      wind_speed_10m: v.windSpeed ?? null,
      wind_direction_10m: v.windDirection ?? null,
      precipitation: (v.rainIntensity || 0) + (v.snowIntensity || 0) + (v.sleetIntensity || 0) + (v.freezingRainIntensity || 0) || null,
      cloud_cover: v.cloudCover ?? null,
      weather_code: TOMORROW_TO_WMO[v.weatherCode] ?? null,
    };
  }

  const result = { time: refTimes, temperature_2m: [], relative_humidity_2m: [], pressure_msl: [], wind_speed_10m: [], wind_direction_10m: [], precipitation: [], cloud_cover: [], weather_code: [] };
  for (const t of refTimes) {
    const e = hourlyMap[t];
    for (const p of Object.keys(result)) { if (p !== "time") result[p].push(e ? e[p] : null); }
  }

  const first = hourly[0]?.values;
  const current = first ? {
    temperature_2m: first.temperature ?? null, relative_humidity_2m: first.humidity ?? null,
    pressure_msl: first.pressureSeaLevel ?? null, wind_speed_10m: first.windSpeed ?? null,
    wind_direction_10m: first.windDirection ?? null, cloud_cover: first.cloudCover ?? null,
    weather_code: TOMORROW_TO_WMO[first.weatherCode] ?? null,
  } : null;
  return { hourly: result, current };
}

// ── OpenWeatherMap Fetch & Normalize ─────────────────────────────────
async function fetchOWM(lat, lon) {
  const key = getApiKey("owm");
  if (!key) return { ok: false, error: "no_key", noKey: true };
  try {
    const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}&appid=${encodeURIComponent(key)}&units=metric`;
    const res = await fetchWithTimeout(url);
    if (res.status === 401 || res.status === 403) throw new Error("Invalid API key");
    if (res.status === 429) throw new Error("Rate limit exceeded");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return { ok: true, data: await res.json() };
  } catch (err) {
    return { ok: false, error: err.message };
  }
}

function normalizeOWM(owmData, refTimes, utcOffsetSec) {
  const list = owmData?.list;
  if (!list?.length) return null;

  // Each 3h entry is repeated for its 3 constituent hours
  const hourlyMap = {};
  for (const entry of list) {
    const utcMs = entry.dt * 1000;
    for (let offset = 0; offset < 3; offset++) {
      const loc = new Date(utcMs + utcOffsetSec * 1000 + offset * 3600000);
      const key = `${loc.getUTCFullYear()}-${String(loc.getUTCMonth()+1).padStart(2,"0")}-${String(loc.getUTCDate()).padStart(2,"0")}T${String(loc.getUTCHours()).padStart(2,"0")}:${String(loc.getUTCMinutes()).padStart(2,"0")}`;
      const rain3h = entry.rain?.["3h"] ?? 0;
      hourlyMap[key] = {
        temperature_2m: entry.main?.temp ?? null,
        relative_humidity_2m: entry.main?.humidity ?? null,
        pressure_msl: entry.main?.pressure ?? null,
        wind_speed_10m: entry.wind?.speed ?? null,
        wind_direction_10m: entry.wind?.deg ?? null,
        precipitation: rain3h / 3,
        cloud_cover: entry.clouds?.all ?? null,
        weather_code: OWM_TO_WMO[entry.weather?.[0]?.id] ?? null,
      };
    }
  }

  const result = { time: refTimes, temperature_2m: [], relative_humidity_2m: [], pressure_msl: [], wind_speed_10m: [], wind_direction_10m: [], precipitation: [], cloud_cover: [], weather_code: [] };
  for (const t of refTimes) {
    const e = hourlyMap[t];
    for (const p of Object.keys(result)) { if (p !== "time") result[p].push(e ? e[p] : null); }
  }

  const first = list[0];
  const current = first ? {
    temperature_2m: first.main?.temp ?? null, relative_humidity_2m: first.main?.humidity ?? null,
    pressure_msl: first.main?.pressure ?? null, wind_speed_10m: first.wind?.speed ?? null,
    wind_direction_10m: first.wind?.deg ?? null, cloud_cover: first.clouds?.all ?? null,
    weather_code: OWM_TO_WMO[first.weather?.[0]?.id] ?? null,
  } : null;
  return { hourly: result, current };
}

// ── Aggregation ──────────────────────────────────────────────────────
function aggregateAll(st) {
  const { openMeteoResults, wttrResult, metNorwayResult, tomorrowResult, owmResult, disabledSources: disabled } = st;
  const allOk = openMeteoResults.filter((r) => r.ok && r.data?.hourly);
  const valid = allOk.filter((r) => !disabled.has(r.key));
  const anyIndependent = (wttrResult?.ok && !disabled.has("wttr"))
    || (metNorwayResult?.ok && !disabled.has("met_norway"))
    || (tomorrowResult?.ok && !disabled.has("tomorrow_io"))
    || (owmResult?.ok && !disabled.has("owm"));
  if (!valid.length && !anyIndependent) return null;

  const refSource = allOk[0] || valid[0];
  let times, utcOffset;
  if (refSource) {
    times = refSource.data.hourly.time;
    utcOffset = refSource.data.utc_offset_seconds || 0;
  } else {
    // No Open-Meteo source available — generate synthetic hourly timestamps (UTC)
    utcOffset = 0;
    times = [];
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    for (let h = 0; h < 24 * 5; h++) {
      const d = new Date(start.getTime() + h * 3600000);
      times.push(d.toISOString().slice(0, 16));
    }
  }

  // Normalize independent sources
  const wttrHasData = wttrResult?.ok && wttrResult.data;
  const wttrNorm = wttrHasData ? normalizeWttrIn(wttrResult.data, times) : null;
  const wttr = (wttrHasData && !disabled.has("wttr")) ? wttrNorm : null;

  const metHasData = metNorwayResult?.ok && metNorwayResult.data;
  const metNorm = metHasData ? normalizeMetNorway(metNorwayResult.data, times, utcOffset) : null;
  const met = (metHasData && !disabled.has("met_norway")) ? metNorm : null;

  // Tomorrow.io
  const tomorrowHasData = tomorrowResult?.ok && tomorrowResult.data;
  const tomorrowNorm = tomorrowHasData ? normalizeTomorrowIo(tomorrowResult.data, times, utcOffset) : null;
  const tomorrow = (tomorrowHasData && !disabled.has("tomorrow_io")) ? tomorrowNorm : null;

  // OpenWeatherMap
  const owmHasData = owmResult?.ok && owmResult.data;
  const owmNorm = owmHasData ? normalizeOWM(owmResult.data, times, utcOffset) : null;
  const owm = (owmHasData && !disabled.has("owm")) ? owmNorm : null;

  // All keys for chart (including disabled, for line display)
  const allChartKeys = [...allOk.map(r => r.key)];
  if (wttrHasData) allChartKeys.push("wttr");
  if (metHasData) allChartKeys.push("met_norway");
  if (tomorrowHasData) allChartKeys.push("tomorrow_io");
  if (owmHasData) allChartKeys.push("owm");

  // Helper: collect values + weights for a parameter from all sources at index i
  const WEIGHTED_PARAMS = ["temperature_2m", "relative_humidity_2m", "pressure_msl", "wind_speed_10m", "wind_direction_10m", "cloud_cover", "weather_code"];
  function collectParam(param, i, sources) {
    const vals = [], ws = [];
    for (const { hourly, weight } of sources) {
      const v = hourly[param]?.[i];
      if (v != null) { vals.push(v); ws.push(weight); }
    }
    return { vals, ws };
  }
  function collectUnweighted(param, i, sources) {
    const vals = [];
    for (const { hourly } of sources) {
      const v = hourly[param]?.[i];
      if (v != null) vals.push(v);
    }
    return vals;
  }

  // Build unified source list for hourly collection
  const enabledSources = [];
  for (const r of valid) enabledSources.push({ hourly: r.data.hourly, weight: MODELS[r.key].weight });
  if (wttr) enabledSources.push({ hourly: wttr.hourly, weight: WTTR.weight });
  if (met) enabledSources.push({ hourly: met.hourly, weight: MET_NORWAY.weight });
  if (tomorrow) enabledSources.push({ hourly: tomorrow.hourly, weight: TOMORROW_IO.weight });
  if (owm) enabledSources.push({ hourly: owm.hourly, weight: OWM.weight });

  // Hourly aggregation
  let confidenceSum = 0, confidenceN = 0;
  const hourly = times.map((t, i) => {
    const row = { time: t };

    // Chart line data for ALL responding sources
    for (const r of allOk) row[`temp_${r.key}`] = r.data.hourly.temperature_2m?.[i] ?? null;
    if (wttrNorm) row.temp_wttr = wttrNorm.hourly.temperature_2m[i];
    if (metNorm) row.temp_met_norway = metNorm.hourly.temperature_2m[i];
    if (tomorrowNorm) row.temp_tomorrow_io = tomorrowNorm.hourly.temperature_2m[i];
    if (owmNorm) row.temp_owm = owmNorm.hourly.temperature_2m[i];

    // Collect all params from enabled sources
    const { vals: temps, ws: tW } = collectParam("temperature_2m", i, enabledSources);
    const { vals: humids, ws: hW } = collectParam("relative_humidity_2m", i, enabledSources);
    const { vals: pressures, ws: pW } = collectParam("pressure_msl", i, enabledSources);
    const { vals: winds, ws: wW } = collectParam("wind_speed_10m", i, enabledSources);
    const { vals: wdirs, ws: wdW } = collectParam("wind_direction_10m", i, enabledSources);
    const { vals: clouds, ws: clW } = collectParam("cloud_cover", i, enabledSources);
    const { vals: codes, ws: coW } = collectParam("weather_code", i, enabledSources);
    const precips = collectUnweighted("precipitation", i, enabledSources);

    // Agreement-aware aggregation for temperature
    const tempResult = smartMean(temps, tW);
    row.temp_agg = tempResult.value != null ? round1(tempResult.value) : null;
    row.confidence = tempResult.confidence;
    confidenceSum += tempResult.confidence; confidenceN++;

    row.temp_min = temps.length ? Math.min(...temps) : null;
    row.temp_max = temps.length ? Math.max(...temps) : null;
    row.humidity = weightedMean(humids, hW);
    row.pressure = weightedMean(pressures, pW);
    row.wind = weightedMean(winds, wW);
    row.windDir = wdirs.length ? circularMean(wdirs) : 0;
    // Precipitation: median (robust to outliers), filter noise < 0.1mm
    const sigPrecip = precips.filter(v => v >= PRECIP_NOISE_FLOOR);
    row.precipitation = sigPrecip.length ? round1(arrMedian(sigPrecip)) : 0;
    row.precipConsensus = precips.length ? Math.round(sigPrecip.length / precips.length * 100) : 0;
    row.cloud_cover = weightedMean(clouds, clW);
    row.weather_code = codes.length ? majorityVote(codes, coW) : 0;
    return row;
  });

  // Current weather
  const cV = { temps: [], feels: [], humids: [], press: [], winds: [], wdirs: [], codes: [], clouds: [] };
  const cW = { temps: [], feels: [], humids: [], press: [], winds: [], wdirs: [], codes: [], clouds: [] };
  function pushCurrent(src, weight) {
    if (!src) return;
    if (src.temperature_2m != null) { cV.temps.push(src.temperature_2m); cW.temps.push(weight); }
    if (src.apparent_temperature != null) { cV.feels.push(src.apparent_temperature); cW.feels.push(weight); }
    if (src.relative_humidity_2m != null) { cV.humids.push(src.relative_humidity_2m); cW.humids.push(weight); }
    if (src.pressure_msl != null) { cV.press.push(src.pressure_msl); cW.press.push(weight); }
    if (src.wind_speed_10m != null) { cV.winds.push(src.wind_speed_10m); cW.winds.push(weight); }
    if (src.wind_direction_10m != null) { cV.wdirs.push(src.wind_direction_10m); cW.wdirs.push(weight); }
    if (src.weather_code != null) { cV.codes.push(src.weather_code); cW.codes.push(weight); }
    if (src.cloud_cover != null) { cV.clouds.push(src.cloud_cover); cW.clouds.push(weight); }
  }
  for (const r of valid) pushCurrent(r.data.current, MODELS[r.key].weight);
  if (wttr) pushCurrent(wttr.current, WTTR.weight);
  if (met) pushCurrent(met.current, MET_NORWAY.weight);
  if (tomorrow) pushCurrent(tomorrow.current, TOMORROW_IO.weight);
  if (owm) pushCurrent(owm.current, OWM.weight);

  const perModel = [];
  for (const r of valid) perModel.push({ key: r.key, temp: r.data.current?.temperature_2m ?? null });
  if (wttr?.current?.temperature_2m != null) perModel.push({ key: "wttr", temp: wttr.current.temperature_2m });
  if (met?.current?.temperature_2m != null) perModel.push({ key: "met_norway", temp: met.current.temperature_2m });
  if (tomorrow?.current?.temperature_2m != null) perModel.push({ key: "tomorrow_io", temp: tomorrow.current.temperature_2m });
  if (owm?.current?.temperature_2m != null) perModel.push({ key: "owm", temp: owm.current.temperature_2m });

  const curTempResult = smartMean(cV.temps, cW.temps);
  const current = {
    temperature: curTempResult.value,
    feels_like: weightedMean(cV.feels, cW.feels),
    humidity: weightedMean(cV.humids, cW.humids),
    pressure: weightedMean(cV.press, cW.press),
    wind: weightedMean(cV.winds, cW.winds),
    windDir: cV.wdirs.length ? circularMean(cV.wdirs) : 0,
    weather_code: cV.codes.length ? majorityVote(cV.codes, cW.codes) : 0,
    cloud_cover: weightedMean(cV.clouds, cW.clouds),
    spread: cV.temps.length > 1 ? Math.max(...cV.temps) - Math.min(...cV.temps) : 0,
    confidence: curTempResult.confidence,
    sourceCount: valid.length + (wttr ? 1 : 0) + (met ? 1 : 0) + (tomorrow ? 1 : 0) + (owm ? 1 : 0),
    perModel,
  };

  // Daily summaries
  const dayMap = {};
  for (const h of hourly) {
    const dk = h.time.slice(0, 10);
    if (!dayMap[dk]) dayMap[dk] = [];
    dayMap[dk].push(h);
  }

  const daily = Object.entries(dayMap).map(([date, pts]) => {
    const allTemps = pts.map((p) => p.temp_agg).filter((v) => v != null);
    const dayPts = pts.filter((p) => { const hr = parseInt(p.time.slice(11, 13)); return hr >= DAY_START_HOUR && hr <= DAY_END_HOUR; });
    const dayCodes = dayPts.map((p) => p.weather_code).filter((v) => v != null);
    const totalP = pts.reduce((s, p) => s + (p.precipitation || 0), 0);
    const maxW = Math.max(0, ...pts.map((p) => p.wind || 0));
    const dt = new Date(date + "T12:00:00");
    return {
      date,
      dayName: dt.toLocaleDateString(currentLang, { weekday: "short" }),
      dayNum: dt.getDate(),
      month: dt.toLocaleDateString(currentLang, { month: "short" }),
      tempMax: allTemps.length ? round1(Math.max(...allTemps)) : null,
      tempMin: allTemps.length ? round1(Math.min(...allTemps)) : null,
      precipitation: Math.round(totalP * 10) / 10,
      maxWind: round1(maxW),
      weather_code: dayCodes.length ? dailyWeatherCode(dayCodes) : 0,
    };
  });

  const chart = hourly.filter((_, i) => i % 3 === 0);
  return { current, hourly, chart, daily, timezone: refSource.data.timezone, modelKeys: allChartKeys };
}

// ── All sources config for display ───────────────────────────────────
function getSourceConfig(key) {
  if (key === "wttr") return WTTR;
  if (key === "met_norway") return MET_NORWAY;
  if (key === "tomorrow_io") return TOMORROW_IO;
  if (key === "owm") return OWM;
  return MODELS[key];
}

// ── Temperature Unit ─────────────────────────────────────────────────
let useFahrenheit = localStorage.getItem("mw_unit") === "F";
function toDisplay(c) { return c != null ? (useFahrenheit ? c * 9 / 5 + 32 : c) : null; }
function fmtTemp(c, decimals = 1) {
  const v = toDisplay(c);
  return v != null ? v.toFixed(decimals) : "\u2014";
}
function unitLabel() { return useFahrenheit ? "F" : "C"; }

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem("mw_lang", lang);
  document.documentElement.lang = lang;
  document.getElementById("lang-select").value = lang;
  // Re-render all text
  if (!state.openMeteoResults) return;
  const agg = aggregateAll(state);
  if (!agg) return;
  renderAll(agg, state.openMeteoResults, state.wttrResult, state.metNorwayResult, state.loc);
}

function setUnit(u) {
  useFahrenheit = (u === "F");
  localStorage.setItem("mw_unit", u);
  document.querySelectorAll("#unit-toggle span[data-unit]").forEach(el => {
    const isActive = el.dataset.unit === u;
    el.classList.toggle("active", isActive);
    el.setAttribute("aria-checked", isActive);
  });
  // Rebuild chart (axis labels change) and re-render
  if (!state.openMeteoResults) return;
  const agg = aggregateAll(state);
  if (!agg) return;
  renderHero(agg.current);
  renderTiles(agg.current);
  buildChart(agg);
  renderChartLegend(agg);
  renderDaily(agg.daily);
}

// ── Global State ─────────────────────────────────────────────────────
const state = {
  lastFetchTime: 0,
  openMeteoResults: null,
  wttrResult: null,
  metNorwayResult: null,
  tomorrowResult: null,
  owmResult: null,
  loc: null,
  mainChart: null,
  showModels: localStorage.getItem("mw_show_models") !== "false",
  chartDays: parseInt(localStorage.getItem("mw_chart_days")) || 5,
  disabledSources: new Set(),
};
try { state.disabledSources = new Set(JSON.parse(localStorage.getItem("mw_disabled") || "[]")); }
catch { /* keep empty set */ }

function chartData(agg) {
  const maxHours = state.chartDays * 24 / 3; // chart is every 3rd hour
  return agg.chart.slice(0, maxHours);
}

const nowLinePlugin = {
  id: "nowLine",
  afterDraw(chart) {
    const labels = chart.data.labels;
    if (!labels?.length) return;
    const now = new Date();
    const nowKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}T${String(now.getHours()).padStart(2,"0")}:00`;
    // Find the two labels surrounding now for interpolation
    let idx = -1;
    for (let i = 0; i < labels.length - 1; i++) {
      if (labels[i] <= nowKey && nowKey < labels[i + 1]) { idx = i; break; }
    }
    if (idx < 0) return;
    const xScale = chart.scales.x;
    const t0 = new Date(labels[idx]).getTime();
    const t1 = new Date(labels[idx + 1]).getTime();
    const frac = (now.getTime() - t0) / (t1 - t0);
    const x0 = xScale.getPixelForValue(idx);
    const x1 = xScale.getPixelForValue(idx + 1);
    const x = x0 + frac * (x1 - x0);
    const { top, bottom } = chart.chartArea;
    const ctx = chart.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = "rgba(251,191,36,0.3)";
    ctx.lineWidth = 1.5;
    ctx.moveTo(x, top);
    ctx.lineTo(x, bottom);
    ctx.stroke();
    ctx.restore();
  },
};

function buildChart(agg) {
  if (!nowLinePlugin._registered) { Chart.register(nowLinePlugin); nowLinePlugin._registered = true; }
  const ctx = document.getElementById("main-chart").getContext("2d");
  const data = chartData(agg);
  const labels = data.map(d => d.time);

  const datasets = [];

  // Per-model lines (dashed)
  for (const k of agg.modelKeys) {
    const cfg = getSourceConfig(k);
    datasets.push({
      label: cfg.name,
      data: data.map(d => toDisplay(d[`temp_${k}`])),
      borderColor: cfg.color + "40",
      borderWidth: 1,
      borderDash: [5, 3],
      pointRadius: 0,
      pointHoverRadius: 3,
      tension: 0.3,
      yAxisID: "y",
      hidden: !state.showModels || state.disabledSources.has(k),
      _sourceKey: k,
      order: 2,
    });
  }

  // Aggregated line (solid white, on top)
  datasets.push({
    label: "Aggregated",
    data: data.map(d => toDisplay(d.temp_agg)),
    borderColor: "#F8FAFC",
    borderWidth: 2.5,
    pointRadius: 0,
    pointHoverRadius: 5,
    pointHoverBackgroundColor: "#F8FAFC",
    pointHoverBorderColor: "#0F172A",
    pointHoverBorderWidth: 2,
    tension: 0.3,
    yAxisID: "y",
    fill: true,
    backgroundColor: (ctx) => {
      const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, ctx.chart.height);
      gradient.addColorStop(0, "rgba(56,189,248,0.10)");
      gradient.addColorStop(1, "rgba(56,189,248,0.01)");
      return gradient;
    },
    order: 1,
  });

  // Precipitation bars
  datasets.push({
    label: "Precipitation",
    data: data.map(d => d.precipitation),
    type: "bar",
    backgroundColor: "rgba(96,165,250,0.55)",
    borderRadius: 2,
    barPercentage: 0.6,
    yAxisID: "y1",
    order: 3,
  });

  if (state.mainChart) state.mainChart.destroy();

  state.mainChart = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 0 },
      transitions: {
        reaggregate: { animation: { duration: 500, easing: "easeInOutCubic" } },
      },
      interaction: {
        mode: "index",
        intersect: false,
      },
      plugins: {
        nowLine: true,
        legend: { display: false },
        tooltip: {
          backgroundColor: "rgba(8,15,30,0.96)",
          borderColor: "rgba(255,255,255,0.1)",
          borderWidth: 1,
          cornerRadius: 10,
          padding: 12,
          titleColor: "#94A3B8",
          titleFont: { size: 11, weight: "600" },
          bodyColor: "#CBD5E1",
          bodyFont: { size: 12 },
          callbacks: {
            title(items) {
              if (!items.length) return "";
              const timeStr = items[0].label;
              const dt = new Date(timeStr);
              return dt.toLocaleDateString(currentLang, { weekday: "short", month: "short", day: "numeric" })
                + "  " + timeStr.slice(11, 16);
            },
            filter(item) {
              return item.raw != null && (item.dataset.label !== "Precipitation" || item.raw > 0);
            },
            label(item) {
              if (item.dataset.label === "Precipitation") {
                return `\uD83D\uDCA7 ${item.raw.toFixed(1)} mm`;
              }
              return `${item.dataset.label}: ${item.raw.toFixed(1)}\u00B0${unitLabel()}`;
            },
            labelColor(item) {
              return {
                borderColor: item.dataset.borderColor || item.dataset.backgroundColor,
                backgroundColor: item.dataset.borderColor || item.dataset.backgroundColor,
                borderRadius: 3,
                borderWidth: 0,
              };
            },
          },
        },
      },
      scales: {
        x: {
          grid: { color: "rgba(255,255,255,0.04)", drawBorder: false },
          ticks: {
            color: "#475569",
            font: { size: 10 },
            maxRotation: 0,
            callback(val, idx) {
              const label = this.getLabelForValue(val);
              if (!label) return "";
              const h = parseInt(label.slice(11, 13));
              if (h === 0) {
                const d = new Date(label);
                return d.toLocaleDateString(currentLang, { weekday: "short", day: "numeric" });
              }
              if (h === 12) return "12:00";
              return "";
            },
          },
        },
        y: {
          position: "left",
          grid: { color: "rgba(255,255,255,0.04)", drawBorder: false },
          ticks: {
            color: "#64748B",
            font: { size: 10 },
            callback: v => `${v}\u00B0`,
          },
        },
        y1: {
          position: "right",
          beginAtZero: true,
          grid: { display: false },
          ticks: {
            color: "rgba(59,130,246,0.6)",
            font: { size: 9 },
            callback: v => v > 0 ? `${v}` : "",
          },
        },
      },
    },
  });
}

function setChartDays(days) {
  state.chartDays = days;
  localStorage.setItem("mw_chart_days", days);
  document.querySelectorAll("#days-toggle span[data-days]").forEach(el => {
    const isActive = parseInt(el.dataset.days) === days;
    el.classList.toggle("active", isActive);
    el.setAttribute("aria-checked", isActive);
  });
  if (!state.openMeteoResults) return;
  const agg = aggregateAll(state);
  if (agg) {
    buildChart(agg);
    renderDaily(agg.daily);
  }
}

function toggleSource(key, badge) {
  if (!state.openMeteoResults) return;
  if (state.disabledSources.has(key)) {
    state.disabledSources.delete(key);
  } else {
    state.disabledSources.add(key);
  }
  badge.classList.toggle("disabled", state.disabledSources.has(key));
  badge.setAttribute("aria-checked", !state.disabledSources.has(key));
  localStorage.setItem("mw_disabled", JSON.stringify([...state.disabledSources]));
  const legendEl = document.querySelector(`.legend-source[data-source="${key}"]`);
  if (legendEl) legendEl.style.display = state.disabledSources.has(key) ? "none" : "";
  reaggregate();
}

function reaggregate() {
  const agg = aggregateAll(state);
  if (!agg) return;
  renderHero(agg.current);
  renderTiles(agg.current);
  updateChartData(agg);
  renderDaily(agg.daily);
}

function updateChartData(agg) {
  if (!state.mainChart) { buildChart(agg); return; }
  const data = chartData(agg);
  for (const ds of state.mainChart.data.datasets) {
    if (ds.label === "Aggregated") {
      ds.data = data.map(d => toDisplay(d.temp_agg));
    } else if (ds.label === "Precipitation") {
      ds.data = data.map(d => d.precipitation);
    } else if (ds._sourceKey) {
      ds.data = data.map(d => toDisplay(d[`temp_${ds._sourceKey}`]));
      ds.hidden = !state.showModels || state.disabledSources.has(ds._sourceKey);
    }
  }
  state.mainChart.update("reaggregate");
}

function toggleModels() {
  state.showModels = !state.showModels;
  localStorage.setItem("mw_show_models", state.showModels);
  const btn = document.getElementById("chart-toggle");
  btn.textContent = state.showModels ? t("hide_models") : t("show_models");
  btn.classList.toggle("active", state.showModels);

  // Toggle legend items
  document.querySelectorAll(".legend-source").forEach(el => {
    el.style.display = (!state.showModels || state.disabledSources.has(el.dataset.source)) ? "none" : "";
  });

  if (!state.mainChart) return;
  for (const ds of state.mainChart.data.datasets) {
    if (ds._sourceKey) {
      ds.hidden = !state.showModels || state.disabledSources.has(ds._sourceKey);
    }
  }
  state.mainChart.update();
}

// ── Render Functions ─────────────────────────────────────────────────
function renderHeader(agg, openMeteoResults, wttrResult, metNorwayResult, loc) {
  const tomorrowHasKey = !!getApiKey("tomorrow");
  const owmHasKey = !!getApiKey("owm");
  const omOk = openMeteoResults.filter(r => r.ok).length;
  const indepOk = (wttrResult?.ok ? 1 : 0) + (metNorwayResult?.ok ? 1 : 0)
    + (tomorrowHasKey && state.tomorrowResult?.ok ? 1 : 0)
    + (owmHasKey && state.owmResult?.ok ? 1 : 0);
  const totalOk = omOk + indepOk;
  const totalSrc = Object.keys(MODELS).length + 2 + (tomorrowHasKey ? 1 : 0) + (owmHasKey ? 1 : 0);

  // Build error map for tooltips
  const errorMap = {};
  for (const r of openMeteoResults) { if (!r.ok) errorMap[r.key] = r.error || t("failed"); }
  if (!wttrResult?.ok) errorMap.wttr = wttrResult?.error || t("failed");
  if (!metNorwayResult?.ok) errorMap.met_norway = metNorwayResult?.error || t("failed");
  if (tomorrowHasKey && !state.tomorrowResult?.ok && !state.tomorrowResult?.noKey) errorMap.tomorrow_io = state.tomorrowResult?.error || t("failed");
  if (owmHasKey && !state.owmResult?.ok && !state.owmResult?.noKey) errorMap.owm = state.owmResult?.error || t("failed");

  let locName;
  if (agg.timezone) {
    const p = agg.timezone.split("/");
    locName = p[p.length - 1].replace(/_/g, " ");
  } else {
    locName = `${loc.lat.toFixed(2)}\u00B0, ${loc.lon.toFixed(2)}\u00B0`;
  }
  if (wttrResult?.ok && wttrResult.data?.nearest_area?.[0]) {
    const area = wttrResult.data.nearest_area[0];
    const city = area.areaName?.[0]?.value;
    const country = area.country?.[0]?.value;
    if (city) locName = country ? `${city}, ${country}` : city;
  }
  document.getElementById("header-loc").textContent = `\uD83D\uDCCD ${locName}`;

  const coordsEl = document.getElementById("header-coords");
  coordsEl.innerHTML = "";
  const coordsText = `${loc.lat.toFixed(4)}\u00B0N \u00B7 ${loc.lon.toFixed(4)}\u00B0E \u00B7 ${agg.timezone || "UTC"} \u00B7 \u25C9 `;
  coordsEl.appendChild(document.createTextNode(coordsText));
  const countSpan = document.createElement("span");
  countSpan.textContent = totalOk;
  if (totalOk < totalSrc) countSpan.className = "source-count-warn";
  coordsEl.appendChild(countSpan);
  coordsEl.appendChild(document.createTextNode(`/${totalSrc} ${t("sources")}`));
  if (state.lastFetchTime) {
    const ts = new Date(state.lastFetchTime);
    const hh = String(ts.getHours()).padStart(2, "0");
    const mm = String(ts.getMinutes()).padStart(2, "0");
    coordsEl.appendChild(document.createTextNode(` \u00B7 ${hh}:${mm}`));
  }

  const badges = document.getElementById("model-badges");
  badges.innerHTML = "";
  const allSources = [...Object.entries(MODELS).map(([k, m]) => ({ key: k, cfg: m, ok: openMeteoResults.find(r => r.key === k)?.ok })),
    { key: "met_norway", cfg: MET_NORWAY, ok: metNorwayResult?.ok },
    { key: "wttr", cfg: WTTR, ok: wttrResult?.ok }];
  if (tomorrowHasKey) allSources.push({ key: "tomorrow_io", cfg: TOMORROW_IO, ok: state.tomorrowResult?.ok });
  if (owmHasKey) allSources.push({ key: "owm", cfg: OWM, ok: state.owmResult?.ok });
  for (const src of allSources) {
    const badge = document.createElement("span");
    const isDisabled = src.ok && state.disabledSources.has(src.key);
    badge.className = `model-badge ${src.ok ? "ok" : "fail"}${isDisabled ? " disabled" : ""}`;
    badge.style.setProperty("--c", src.cfg.color);
    badge.textContent = src.cfg.name;
    if (src.ok) {
      badge.title = t("toggle_source");
      badge.setAttribute("role", "switch");
      badge.setAttribute("aria-checked", !isDisabled);
      badge.tabIndex = 0;
      badge.addEventListener("click", () => toggleSource(src.key, badge));
      badge.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleSource(src.key, badge); }
      });
    } else {
      badge.title = errorMap[src.key] || t("failed");
    }
    badges.appendChild(badge);
  }
}

function renderHero(cur) {
  const wmo = getWmo(cur.weather_code);
  const ul = unitLabel();
  document.getElementById("hero-emoji").textContent = wmo.icon;
  document.getElementById("hero-desc").textContent = wmo.desc;
  document.getElementById("hero-temp-val").textContent =
    cur.temperature != null ? `${fmtTemp(cur.temperature)}\u00B0` : "\u2014\u00B0";
  document.getElementById("hero-feels").textContent =
    cur.feels_like != null ? `${t("feels_like")} ${fmtTemp(cur.feels_like)}\u00B0${ul}` : "";

  const meta = document.getElementById("hero-meta");
  const spreadDisp = useFahrenheit ? cur.spread * 9 / 5 : cur.spread;
  const spreadClass = cur.spread < 1 ? "spread-ok" : cur.spread < 2.5 ? "spread-mid" : "spread-bad";
  const confPct = Math.round((cur.confidence || 0) * 100);
  const confClass = confPct >= 80 ? "spread-ok" : confPct >= 50 ? "spread-mid" : "spread-bad";
  meta.textContent = "";
  const confSpan = document.createElement("span");
  confSpan.innerHTML = `${escapeHtml(t("confidence"))}: <b class="${confClass}">${confPct}%</b>`;
  const spreadSpan = document.createElement("span");
  spreadSpan.innerHTML = `${escapeHtml(t("spread"))}: <b class="${spreadClass}">\u00B1${(spreadDisp / 2).toFixed(1)}\u00B0${ul}</b>`;
  meta.append(confSpan, spreadSpan);

  let existing = meta.parentElement.querySelector(".hero-meta-sources");
  if (!existing) { existing = document.createElement("div"); existing.className = "hero-meta-sources"; meta.after(existing); }
  existing.textContent = "";
  for (const m of cur.perModel.filter(m => m.temp != null)) {
    const c = getSourceConfig(m.key);
    const span = document.createElement("span");
    span.style.color = c.color;
    span.textContent = `${c.name}: ${fmtTemp(m.temp)}\u00B0`;
    existing.appendChild(span);
  }
}

function renderTiles(cur) {
  const tiles = document.getElementById("tiles");
  const data = [
    { icon: "\uD83D\uDCA7", label: t("humidity"), value: cur.humidity != null ? cur.humidity.toFixed(0) : "\u2014", unit: "%" },
    { icon: "\uD83D\uDCA8", label: t("wind"), value: cur.wind != null ? cur.wind.toFixed(1) : "\u2014", unit: `m/s ${windDir(cur.windDir)}` },
    { icon: "\uD83D\uDCCA", label: t("pressure"), value: cur.pressure != null ? cur.pressure.toFixed(0) : "\u2014", unit: "hPa" },
    { icon: "\u2601\uFE0F", label: t("clouds"), value: cur.cloud_cover != null ? Math.round(cur.cloud_cover) : "\u2014", unit: "%" },
  ];
  tiles.innerHTML = data.map(tile => `
    <div class="tile">
      <div class="tile-label">${tile.icon} ${tile.label}</div>
      <div class="tile-value">${tile.value}<span class="unit">${tile.unit}</span></div>
    </div>
  `).join("");
}

function renderChartLegend(agg) {
  const legend = document.getElementById("chart-legend");
  legend.innerHTML = "";

  // Aggregated (not hoverable)
  const aggItem = document.createElement("span");
  aggItem.className = "legend-item";
  aggItem.innerHTML = `<span class="legend-line" style="background:#F8FAFC"></span> ${t("aggregated")}`;
  legend.appendChild(aggItem);

  // Per-source (hoverable — highlight on chart)
  for (const k of agg.modelKeys) {
    const cfg = getSourceConfig(k);
    const item = document.createElement("span");
    item.className = "legend-item hoverable legend-source";
    item.dataset.source = k;
    if (!state.showModels || state.disabledSources.has(k)) item.style.display = "none";
    item.innerHTML = `<span class="legend-dash" style="border-color:${cfg.color}"></span> ${cfg.name}`;
    item.addEventListener("mouseenter", () => highlightSource(k, true));
    item.addEventListener("mouseleave", () => highlightSource(k, false));
    legend.appendChild(item);
  }

  // Precip
  const precItem = document.createElement("span");
  precItem.className = "legend-item";
  precItem.innerHTML = `<span class="legend-box" style="background:rgba(96,165,250,0.55)"></span> ${t("precip_mm")}`;
  legend.appendChild(precItem);
}

function highlightSource(key, on) {
  if (!state.mainChart) return;
  const cfg = getSourceConfig(key);
  const targetLabel = cfg?.name;
  for (const ds of state.mainChart.data.datasets) {
    if (ds.label === "Aggregated" || ds.label === "Precipitation") continue;
    if (ds.label === targetLabel) {
      ds.borderColor = on ? cfg.color : cfg.color + "40";
      ds.borderWidth = on ? 2.5 : 1;
    } else if (on) {
      ds.borderWidth = 0.6;
    } else {
      ds.borderWidth = 1;
    }
  }
  state.mainChart.update("none");
}

function renderDaily(daily) {
  const grid = document.getElementById("daily-grid");
  grid.innerHTML = daily.slice(0, state.chartDays).map((d, i) => {
    const w = getWmo(d.weather_code);
    const today = i === 0;
    return `
      <div class="day-card ${today ? "today" : ""}">
        <div class="day-name">${today ? t("today") : d.dayName}</div>
        <div class="day-date">${d.month} ${d.dayNum}</div>
        <div class="day-emoji">${w.icon}</div>
        <div class="day-desc">${w.desc}</div>
        <div class="day-temps">
          ${fmtTemp(d.tempMax, 0)}\u00B0
          <span class="lo"> / ${fmtTemp(d.tempMin, 0)}\u00B0</span>
        </div>
        <div class="day-extra">
          <span>\uD83D\uDCA7${d.precipitation > 0 ? ` ${d.precipitation}` : " 0"}<span class="sm">mm</span></span>
          <span>\uD83D\uDCA8 ${d.maxWind}<span class="sm">m/s</span></span>
        </div>
      </div>
    `;
  }).join("");
}

function renderFooter() {
  const footer = document.getElementById("app-footer");
  let html = `<div class="footer-title">${t("data_sources")}</div>`;
  const allSrc = [...Object.entries(MODELS).map(([k, m]) => m), MET_NORWAY, WTTR];
  if (getApiKey("tomorrow")) allSrc.push(TOMORROW_IO);
  if (getApiKey("owm")) allSrc.push(OWM);
  for (const m of allSrc) {
    html += `<div class="footer-model">
      <span class="footer-dot" style="background:${m.color}"></span>
      <b style="color:${m.color}">${escapeHtml(m.name)}</b> \u2014 ${escapeHtml(m.desc)}
    </div>`;
  }
  html += `<div class="footer-divider">${t("agg_desc")}</div>`;
  html += `<div class="footer-powered">
    ${t("powered_by")} <a href="https://open-meteo.com" target="_blank" rel="noreferrer">Open-Meteo.com</a>,
    <a href="https://api.met.no" target="_blank" rel="noreferrer">MET Norway</a>,
    <a href="https://wttr.in" target="_blank" rel="noreferrer">wttr.in</a>`;
  if (getApiKey("tomorrow")) html += `, <a href="https://www.tomorrow.io" target="_blank" rel="noreferrer">Tomorrow.io</a>`;
  if (getApiKey("owm")) html += `, <a href="https://openweathermap.org" target="_blank" rel="noreferrer">OpenWeatherMap</a>`;
  html += `<a href="https://github.com/n0madic/metaweather" target="_blank" rel="noreferrer" style="margin-left:auto">GitHub</a>
  </div>`;
  footer.innerHTML = html;
}

function renderAll(agg, openMeteoResults, wttrResult, metNorwayResult, loc) {
  renderHeader(agg, openMeteoResults, wttrResult, metNorwayResult, loc);
  renderHero(agg.current);
  renderTiles(agg.current);
  buildChart(agg);
  renderChartLegend(agg);
  renderDaily(agg.daily);
  renderFooter();
  document.querySelector(".chart-header h2").textContent = t("temp_precip");
  document.querySelector(".daily-section h2").textContent = t("daily_overview");
  document.getElementById("chart-toggle").textContent = t(state.showModels ? "hide_models" : "show_models");
}

// ── Settings Modal ───────────────────────────────────────────────────
function settingsStatus(provider) {
  const statusId = provider === "tomorrow" ? "status-tomorrow" : "status-owm";
  const result = provider === "tomorrow" ? state.tomorrowResult : state.owmResult;
  const st = document.getElementById(statusId);
  const hasKey = !!getApiKey(provider);
  if (hasKey && result && !result.ok && !result.noKey) {
    st.textContent = result.error || t("failed");
    st.className = "key-status error";
  } else if (hasKey) {
    st.textContent = t("key_saved");
    st.className = "key-status saved";
  } else {
    st.textContent = "";
    st.className = "key-status";
  }
}

function openSettings() {
  const overlay = document.getElementById("settings-overlay");
  document.getElementById("key-tomorrow").value = getApiKey("tomorrow");
  document.getElementById("key-owm").value = getApiKey("owm");
  settingsStatus("tomorrow");
  settingsStatus("owm");
  // Localize modal
  overlay.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    const text = t(key);
    if (text !== key) el.textContent = text;
  });
  overlay.querySelectorAll(".settings-input").forEach(el => {
    el.placeholder = t("enter_key");
  });
  overlay.classList.add("open");
}

function closeSettings() {
  document.getElementById("settings-overlay").classList.remove("open");
}

function saveAllKeys() {
  const tKey = document.getElementById("key-tomorrow").value.trim();
  const oKey = document.getElementById("key-owm").value.trim();
  setApiKey("tomorrow", tKey || "");
  setApiKey("owm", oKey || "");
  if (!tKey) {
    state.disabledSources.delete("tomorrow_io");
  }
  if (!oKey) {
    state.disabledSources.delete("owm");
  }
  localStorage.setItem("mw_disabled", JSON.stringify([...state.disabledSources]));
  closeSettings();
  refresh();
}

function clearKey(provider) {
  const inputId = provider === "tomorrow" ? "key-tomorrow" : "key-owm";
  const statusId = provider === "tomorrow" ? "status-tomorrow" : "status-owm";
  document.getElementById(inputId).value = "";
  const st = document.getElementById(statusId);
  st.textContent = "";
  st.className = "key-status";
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeSettings();
});

// ── Main ─────────────────────────────────────────────────────────────
let isRefreshing = false;
async function refresh() {
  if (!state.loc || isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  try {
    const [openMeteoResults, wttrResult, metNorwayResult, tomorrowResult, owmResult] = await Promise.all([
      Promise.all(Object.keys(MODELS).map(k => fetchModel(k, state.loc.lat, state.loc.lon))),
      fetchWttrIn(state.loc.lat, state.loc.lon),
      fetchMetNorway(state.loc.lat, state.loc.lon),
      fetchTomorrowIo(state.loc.lat, state.loc.lon),
      fetchOWM(state.loc.lat, state.loc.lon),
    ]);

    state.openMeteoResults = openMeteoResults;
    state.wttrResult = wttrResult;
    state.metNorwayResult = metNorwayResult;
    if (tomorrowResult.ok || !state.tomorrowResult?.ok) state.tomorrowResult = tomorrowResult;
    if (owmResult.ok || !state.owmResult?.ok) state.owmResult = owmResult;
    state.lastFetchTime = Date.now();

    const agg = aggregateAll(state);
    if (agg) {
      renderAll(agg, openMeteoResults, wttrResult, metNorwayResult, state.loc);
    }
  } finally {
    btn.classList.remove("spinning");
    isRefreshing = false;
  }
}

async function main() {
  // Apply saved language
  const loaderTitle = document.getElementById("loader-title");
  loaderTitle.textContent = t("detecting");
  document.getElementById("lang-select").value = currentLang;
  document.documentElement.lang = currentLang;

  // Get location: use short-lived cache (30 min), then re-detect
  const FALLBACK = { lat: 50.4501, lon: 30.5234 };
  const LOC_TTL = LOC_CACHE_TTL;
  const cachedRaw = localStorage.getItem("mw_loc");
  let cached;
  try { cached = cachedRaw ? JSON.parse(cachedRaw) : null; }
  catch { cached = null; }
  let loc = (cached && Date.now() - cached.ts < LOC_TTL) ? cached : null;

  if (!loc) {
    let fromGeo = false;
    try {
      loc = await new Promise((resolve) => {
        if (!navigator.geolocation) { resolve(FALLBACK); return; }
        navigator.geolocation.getCurrentPosition(
          (p) => { fromGeo = true; resolve({ lat: p.coords.latitude, lon: p.coords.longitude }); },
          () => resolve(FALLBACK),
          { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
        );
      });
    } catch {
      loc = FALLBACK;
    }
    // Only cache real geolocation, not fallback
    if (fromGeo) localStorage.setItem("mw_loc", JSON.stringify({ ...loc, ts: Date.now() }));
  }

  loaderTitle.textContent = t("gathering");

  // Fetch all sources in parallel
  const [openMeteoResults, wttrResult, metNorwayResult, tomorrowResult, owmResult] = await Promise.all([
    Promise.all(Object.keys(MODELS).map(k => fetchModel(k, loc.lat, loc.lon))),
    fetchWttrIn(loc.lat, loc.lon),
    fetchMetNorway(loc.lat, loc.lon),
    fetchTomorrowIo(loc.lat, loc.lon),
    fetchOWM(loc.lat, loc.lon),
  ]);

  // Store globally for reaggregation
  state.openMeteoResults = openMeteoResults;
  state.wttrResult = wttrResult;
  state.metNorwayResult = metNorwayResult;
  state.tomorrowResult = tomorrowResult;
  state.owmResult = owmResult;
  state.loc = loc;
  state.lastFetchTime = Date.now();

  const agg = aggregateAll(state);
  if (!agg) {
    document.getElementById("loader").style.display = "none";
    const err = document.getElementById("error-screen");
    err.style.display = "flex";
    err.textContent = t("sources_failed");
    return;
  }

  // Render
  document.getElementById("loader").style.display = "none";
  document.getElementById("app").style.display = "block";

  // Apply saved preferences to UI
  if (useFahrenheit) {
    document.querySelectorAll("#unit-toggle span[data-unit]").forEach(el => {
      const isActive = el.dataset.unit === "F";
      el.classList.toggle("active", isActive);
      el.setAttribute("aria-checked", isActive);
    });
  }
  document.querySelectorAll("#days-toggle span[data-days]").forEach(el => {
    const isActive = parseInt(el.dataset.days) === state.chartDays;
    el.classList.toggle("active", isActive);
    el.setAttribute("aria-checked", isActive);
  });
  if (!state.showModels) {
    document.getElementById("chart-toggle").textContent = t("show_models");
    document.getElementById("chart-toggle").classList.remove("active");
  }

  renderAll(agg, openMeteoResults, wttrResult, metNorwayResult, loc);
}

// Dismiss chart tooltip on touch outside canvas
document.addEventListener("touchstart", (e) => {
  if (!state.mainChart) return;
  const canvas = document.getElementById("main-chart");
  if (canvas && !canvas.contains(e.target)) {
    state.mainChart.setActiveElements([]);
    state.mainChart.tooltip.setActiveElements([], { x: 0, y: 0 });
    state.mainChart.update("none");
  }
});

// Auto-refresh when returning to app after 1+ hour
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && state.lastFetchTime && Date.now() - state.lastFetchTime > STALE_MS) {
    refresh();
  }
});

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

main();
</script>
